<!doctype html>
<html lang="sr-Latn">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Detalji proizvoda, dostupne boje, veličine, cena i lager.">
  <title>Proizvod — DemoShop</title>
  <link rel="preconnect" href="https://demo-group-api.marko-demogroup.workers.dev">
  <link rel="stylesheet" href="style.css?v=5">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html"><span class="brand-mark">D</span><span>Demo<span>Shop</span></span></a>
      <a class="back-link" href="index.html">← Nazad na katalog</a>
    </div>
  </header>

  <main class="container product-page">
    <div id="productMessage" class="message">Učitavanje proizvoda…</div>
    <article id="productDetail" class="product-detail hidden">
      <section class="gallery-panel">
        <div class="main-image-wrap"><img id="mainImage" alt=""></div>
        <div id="thumbs" class="thumbs"></div>
      </section>

      <section class="product-info">
        <p id="breadcrumb" class="eyebrow"></p>
        <h1 id="productName"></h1>
        <p class="model-line">Model <strong id="modelCode"></strong></p>

        <div class="price-row"><span id="price">—</span><small>Cena po komadu · bez PDV-a</small></div>

        <div class="option-block">
          <div class="option-heading"><strong>Boja / nijansa</strong><span id="selectedShadeLabel"></span></div>
          <div id="colorOptions" class="color-options"></div>
        </div>

        <div id="sizeBlock" class="option-block compact-size-picker">
          <div class="option-heading"><strong>Veličina</strong><span id="selectedSizeLabel"></span></div>
          <div id="sizeOptions" class="size-options"></div>
        </div>

        <div id="variantTableBlock" class="variant-table-block hidden">
          <div class="variant-table-head"><span>Veličina</span><span>Cena</span><span>Zaliha</span></div>
          <div id="variantTableBody" class="variant-table-body"></div>
        </div>

        <div class="variant-card">
          <div><span>Šifra artikla</span><strong id="variantCode">—</strong></div>
          <div><span>Dostupnost</span><strong id="stock">—</strong></div>
        </div>

        <button id="quoteButton" class="quote-button" type="button">Zatraži ponudu</button>
        <p class="helper">Izaberite boju i veličinu kako bismo pripremili upit za tačnu varijantu.</p>
      </section>
    </article>
  </main>
  <script src="product.js?v=5"></script>
</body>
</html>
